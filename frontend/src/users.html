<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Users · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="users" data-crumbs="WRG CRM | Manage Users">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow">Admin · Read-only</span>
            <h1 class="hero-title">Manage <span class="accent">Users</span></h1>
            <p class="hero-sub">master_user — daftar karyawan. CRUD edit currently via SQL; halaman ini read-only buat verify batch composition.</p>
          </div>
        </section>

        <div class="grid">
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">All users</span>
                <h2 class="card-title">Daftar karyawan</h2>
              </div>
              <span class="card-action" id="uCount">…</span>
            </div>
            <div style="overflow-x:auto;">
              <table style="width:100%; font-size:13px;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">ID</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Nama</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Panggilan</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Role</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Posisi</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Cabang</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">WA</th>
                    <th style="padding:8px; text-align:center; border-bottom:2px solid #e2e8f0;">Aktif</th>
                    <th style="padding:8px; text-align:center; border-bottom:2px solid #e2e8f0;">Wajib P/R</th>
                  </tr>
                </thead>
                <tbody id="uBody"><tr><td colspan="9" style="padding:24px; text-align:center; color:#94a3b8;">Memuat…</td></tr></tbody>
              </table>
            </div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);
            const escapeHtml = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const bool = (v) => v ? '<span style="color:#16a34a;">✓</span>' : '<span style="color:#dc2626;">✗</span>';

            async function load() {
              const r = await fetch('/api/users');
              const json = await r.json();
              const rows = json.rows || [];
              $('uCount').textContent = `${rows.length} users`;
              if (rows.length === 0) { $('uBody').innerHTML = '<tr><td colspan="9" style="text-align:center; padding:24px; color:#94a3b8;">Belum ada data.</td></tr>'; return; }
              $('uBody').innerHTML = rows.map((u) => `
                <tr>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; color:#94a3b8; font-size:11px;">${u.id}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(u.nama)}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;"><strong>${escapeHtml(u.panggilan || '')}</strong></td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;"><span style="background:#e0e7ff; color:#3730a3; padding:2px 6px; border-radius:4px; font-size:11px;">${escapeHtml(u.role)}</span></td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; font-size:12px; color:#64748b;">${escapeHtml(u.posisi || '')}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(u.cabang || '')}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; font-family:monospace; font-size:11px;">${escapeHtml(u.wa_number || '')}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; text-align:center;">${bool(u.aktif)}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; text-align:center;">${bool(u.wajib_plan_report)}</td>
                </tr>
              `).join('');
            }
            document.addEventListener('DOMContentLoaded', load);
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
