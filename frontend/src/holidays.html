<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Holidays · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="holidays" data-crumbs="WRG CRM | Manage Holidays">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow">Admin</span>
            <h1 class="hero-title">Manage <span class="accent">Holidays</span></h1>
            <p class="hero-sub">master_holiday — libur nasional &amp; cuti bersama internal. is_working_day() reads from here untuk gate cron reminders.</p>
          </div>
        </section>

        <div class="grid">
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">New entry</span>
                <h2 class="card-title">Tambah libur</h2>
              </div>
            </div>
            <style>
              #hForm .field { display:flex; flex-direction:column; }
              #hForm .field-label { min-height: 20px; line-height: 1.4; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
              #hForm .input, #hForm .btn { height: 40px; box-sizing: border-box; }
              #hForm .req-spacer { opacity: 0; }
            </style>
            <form id="hForm" class="form-grid" style="display:grid; grid-template-columns:1fr 2fr auto; gap:14px; align-items:stretch;">
              <div class="field">
                <label class="field-label" for="fTgl">Tanggal <span class="req">*</span></label>
                <input type="date" id="fTgl" class="input" required>
              </div>
              <div class="field">
                <label class="field-label" for="fKet">Keterangan <span class="req">*</span></label>
                <input type="text" id="fKet" class="input" required placeholder="mis. 'Idul Adha 1448H' atau 'Cuti bersama Lebaran'">
              </div>
              <div class="field">
                <label class="field-label"><span class="req-spacer">&nbsp;</span></label>
                <button type="submit" class="btn btn--primary">+ Add / Update</button>
              </div>
            </form>
          </section>

          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">All entries</span>
                <h2 class="card-title">Daftar libur</h2>
              </div>
              <span class="card-action" id="hCount">…</span>
            </div>
            <div style="overflow-x:auto;">
              <table style="width:100%; font-size:13px;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Tanggal</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Hari</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Keterangan</th>
                    <th style="padding:8px; text-align:right; border-bottom:2px solid #e2e8f0;">Action</th>
                  </tr>
                </thead>
                <tbody id="hBody"><tr><td colspan="4" style="padding:24px; text-align:center; color:#94a3b8;">Memuat…</td></tr></tbody>
              </table>
            </div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);
            const escapeHtml = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const HARI = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

            async function load() {
              const r = await fetch('/api/holidays');
              const json = await r.json();
              const rows = json.rows || [];
              $('hCount').textContent = `${rows.length} entries`;
              if (rows.length === 0) { $('hBody').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:24px; color:#94a3b8;">Belum ada entry.</td></tr>'; return; }
              $('hBody').innerHTML = rows.map((row) => {
                const d = new Date(row.tanggal);
                const hari = HARI[d.getDay()];
                return `
                  <tr>
                    <td style="padding:8px; border-bottom:1px solid #f1f5f9;"><strong>${escapeHtml(row.tanggal)}</strong></td>
                    <td style="padding:8px; border-bottom:1px solid #f1f5f9; font-size:12px; color:#64748b;">${hari}</td>
                    <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(row.keterangan)}</td>
                    <td style="padding:8px; border-bottom:1px solid #f1f5f9; text-align:right;">
                      <button class="btn btn--ghost" onclick="delH(${row.id})" style="font-size:11px; color:#dc2626;">Delete</button>
                    </td>
                  </tr>`;
              }).join('');
            }

            window.delH = async (id) => {
              if (!confirm('Hapus entry ini?')) return;
              const r = await fetch(`/api/holidays/${id}`, { method: 'DELETE' });
              if (r.ok) { load(); } else { alert('Gagal: ' + r.status); }
            };

            $('hForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const body = { tanggal: $('fTgl').value, keterangan: $('fKet').value };
              const r = await fetch('/api/holidays', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
              if (r.ok) { $('hForm').reset(); load(); }
              else { const err = await r.json().catch(() => ({})); alert('Gagal: ' + (err.error || r.status)); }
            });

            document.addEventListener('DOMContentLoaded', load);
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
