<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales Calendar · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <style>
      .cal-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
      .cal-title { font-size:28px; font-weight:600; margin:0; }
      .cal-title .year { color:#94a3b8; font-weight:400; margin-left:6px; }
      .cal-nav { display:flex; gap:6px; align-items:center; }
      .cal-nav button { padding:6px 12px; }
      .cal-view-tabs { display:inline-flex; background:#f1f5f9; border-radius:8px; padding:3px; gap:2px; }
      .cal-view-tabs button { padding:5px 14px; border:none; background:transparent; border-radius:6px; font-size:13px; color:#64748b; cursor:pointer; transition:all 0.15s; }
      .cal-view-tabs button.active { background:#fff; color:#0f172a; box-shadow:0 1px 2px rgba(0,0,0,0.08); }
      .cal-filter { display:flex; gap:8px; flex-wrap:wrap; }
      .cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; background:#e2e8f0; gap:1px; }
      .cal-day-header { background:#fafbfc; padding:8px 12px; font-size:12px; color:#64748b; text-align:left; font-weight:500; }
      .cal-day-header.weekend { background:#f8fafc; }
      .cal-cell { background:#fff; min-height:120px; padding:8px 10px; cursor:pointer; transition:background 0.12s; display:flex; flex-direction:column; gap:4px; }
      .cal-cell:hover { background:#fafbfc; }
      .cal-cell.outside { background:#fafbfc; }
      .cal-cell.outside .cal-date { color:#cbd5e1; }
      .cal-cell.today { background:#fef3c7; }
      .cal-cell.today .cal-date { background:#dc2626; color:#fff; border-radius:50%; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; }
      .cal-cell.weekend { background:#fafbfc; }
      .cal-cell.holiday { background:#fff7ed; }
      .cal-date { font-size:14px; font-weight:500; color:#0f172a; }
      .cal-pill { display:inline-block; max-width:100%; padding:2px 8px; border-radius:10px; font-size:11px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .cal-pill.holiday { background:#f5d0fe; color:#86198f; }
      .cal-pill.full { background:#dcfce7; color:#166534; }
      .cal-pill.partial { background:#fef3c7; color:#92400e; }
      .cal-pill.late { background:#fee2e2; color:#991b1b; }
      .cal-pill.none { background:#f1f5f9; color:#64748b; }
      .cal-pill.am { background:#e0f2fe; color:#0369a1; }
      .cal-pill.reminder { background:#ffe4e6; color:#9f1239; font-weight:500; }
    </style>
  </head>
  <body data-active="sales-calendar" data-crumbs="WRG CRM &gt; Sales Calendar">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow">Sales</span>
            <h1 class="hero-title">Sales <span class="accent">Calendar</span></h1>
            <p class="hero-sub">Kalender plan & report Account Manager + libur nasional. Klik tanggal untuk drilldown.</p>
          </div>
          <div class="hero-actions cal-filter">
            <select id="amFilter" class="btn btn--ghost" style="padding:6px 10px;">
              <option value="">Semua AM</option>
            </select>
            <select id="cabangFilter" class="btn btn--ghost" style="padding:6px 10px;">
              <option value="">Semua cabang</option>
            </select>
          </div>
        </section>

        <div class="grid">
          <section class="col-12 card">
            <div class="cal-header">
              <h2 class="cal-title" id="calTitle">—</h2>
              <div class="cal-view-tabs">
                <button class="active" data-view="month">Month</button>
                <button data-view="week">Week</button>
              </div>
              <div class="cal-nav">
                <button class="btn btn--ghost" id="navPrev">‹</button>
                <button class="btn btn--ghost" id="navToday">Today</button>
                <button class="btn btn--ghost" id="navNext">›</button>
              </div>
            </div>
            <div class="cal-grid" id="calGrid">
              <div class="cal-day-header">Sun</div>
              <div class="cal-day-header">Mon</div>
              <div class="cal-day-header">Tue</div>
              <div class="cal-day-header">Wed</div>
              <div class="cal-day-header">Thu</div>
              <div class="cal-day-header">Fri</div>
              <div class="cal-day-header weekend">Sat</div>
            </div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);
            const escapeHtml = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

            const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            let view = 'month';
            let cursor = new Date(); // first day of currently-viewed month/week
            let allAMs = [];
            let cache = {}; // by `${user_id}_${from}_${to}` → drilldown plans
            let holidays = []; // [{tanggal, keterangan}]
            let reminders = []; // [{tanggal_reminder, panggilan, keterangan}]

            function pad(n) { return n.toString().padStart(2,'0'); }
            function fmtDate(d) {
              // Local date (not UTC) — WIB UTC+7, toISOString shifts back to UTC
              // and breaks tanggal lookups (DB stores DATE as local).
              return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            }
            function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
            function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); return x; }

            async function loadAMs() {
              try {
                const r = await fetch('/api/users');
                const json = await r.json();
                allAMs = (json.rows || []).filter((u) => u.role === 'AM' && u.aktif);
                const amSel = $('amFilter');
                allAMs.sort((a, b) => (a.cabang || '').localeCompare(b.cabang || '') || (a.panggilan || '').localeCompare(b.panggilan || ''));
                allAMs.forEach((a) => {
                  const opt = document.createElement('option');
                  opt.value = a.id; opt.textContent = `${a.panggilan} (${a.cabang})`;
                  amSel.appendChild(opt);
                });
                const cabSel = $('cabangFilter');
                const cabs = [...new Set(allAMs.map((a) => a.cabang))].sort();
                cabs.forEach((c) => {
                  const opt = document.createElement('option');
                  opt.value = c; opt.textContent = c;
                  cabSel.appendChild(opt);
                });
              } catch (e) { console.error(e); }
            }

            async function loadHolidays() {
              try {
                const r = await fetch('/api/holidays');
                if (!r.ok) return;
                const json = await r.json();
                holidays = json.rows || [];
              } catch (e) { console.error(e); }
            }

            async function loadReminders(from, to) {
              try {
                const r = await fetch(`/api/reminders?from=${from}&to=${to}`);
                if (!r.ok) { reminders = []; return; }
                const json = await r.json();
                reminders = json.rows || [];
              } catch (e) { reminders = []; }
            }

            async function fetchAMPlans(amId, from, to) {
              const key = `${amId}_${from}_${to}`;
              if (cache[key]) return cache[key];
              try {
                const r = await fetch(`/api/drilldown?user_id=${amId}&from=${from}&to=${to}`);
                if (!r.ok) return [];
                const json = await r.json();
                cache[key] = json.plans || [];
                return cache[key];
              } catch (e) { return []; }
            }

            function getRangeForView() {
              if (view === 'month') {
                const first = startOfMonth(cursor);
                const last = new Date(first.getFullYear(), first.getMonth() + 1, 0);
                // Calendar grid starts at preceding Sunday
                const gridStart = startOfWeek(first);
                const gridEnd = new Date(gridStart);
                gridEnd.setDate(gridEnd.getDate() + 41); // 6 weeks
                return { display: first, last, gridStart, gridEnd };
              } else {
                const gridStart = startOfWeek(cursor);
                const gridEnd = new Date(gridStart);
                gridEnd.setDate(gridEnd.getDate() + 6);
                return { display: gridStart, last: gridEnd, gridStart, gridEnd };
              }
            }

            async function render() {
              const range = getRangeForView();
              // Update title
              if (view === 'month') {
                $('calTitle').innerHTML = `${MONTHS[range.display.getMonth()]} <span class="year">${range.display.getFullYear()}</span>`;
              } else {
                const s = range.gridStart, e = range.gridEnd;
                $('calTitle').innerHTML = `${s.getDate()} ${MONTHS[s.getMonth()].slice(0,3)} – ${e.getDate()} ${MONTHS[e.getMonth()].slice(0,3)} <span class="year">${e.getFullYear()}</span>`;
              }

              const from = fmtDate(range.gridStart);
              const to = fmtDate(range.gridEnd);

              // Filter AMs
              let amsToFetch = allAMs;
              const amFilter = $('amFilter').value;
              const cabFilter = $('cabangFilter').value;
              if (amFilter) amsToFetch = amsToFetch.filter((a) => String(a.id) === amFilter);
              if (cabFilter) amsToFetch = amsToFetch.filter((a) => a.cabang === cabFilter);

              // Fetch plans
              const allPlans = (await Promise.all(amsToFetch.map((am) =>
                fetchAMPlans(am.id, from, to).then((p) => p.map((x) => ({ ...x, _amId: am.id, _amName: am.panggilan, _amCab: am.cabang })))
              ))).flat();

              // Fetch reminders for range
              await loadReminders(from, to);

              // Group plans by date
              const byDate = {};
              allPlans.forEach((p) => {
                const d = (p.tanggal || '').slice(0,10);
                (byDate[d] = byDate[d] || []).push(p);
              });

              // Group holidays by date
              const holByDate = {};
              holidays.forEach((h) => { holByDate[h.tanggal] = h.keterangan; });

              // Group reminders by date (apply same AM/cabang filter as plans)
              const remByDate = {};
              reminders.forEach((r) => {
                if (amFilter && String(r.user_id) !== amFilter) return;
                if (cabFilter && r.cabang !== cabFilter) return;
                (remByDate[r.tanggal_reminder] = remByDate[r.tanggal_reminder] || []).push(r);
              });

              // Build cells
              const cells = [];
              const today = fmtDate(new Date());
              const numCells = view === 'month' ? 42 : 7;
              for (let i = 0; i < numCells; i++) {
                const d = new Date(range.gridStart);
                d.setDate(d.getDate() + i);
                const ds = fmtDate(d);
                const isOutside = view === 'month' && d.getMonth() !== range.display.getMonth();
                const isToday = ds === today;
                const isWknd = d.getDay() === 0 || d.getDay() === 6;
                const isHoliday = !!holByDate[ds];

                const dayPlans = byDate[ds] || [];
                // Group by AM
                const byAM = {};
                dayPlans.forEach((p) => {
                  const key = `${p._amId}_${p._amName}_${p._amCab}`;
                  byAM[key] = byAM[key] || { name: p._amName, cab: p._amCab, total: 0, reported: 0, geo: 0, late: false };
                  byAM[key].total++;
                  if (p.reported) byAM[key].reported++;
                  if (p.visit_lat) byAM[key].geo++;
                  if (p.is_late_plan) byAM[key].late = true;
                });

                let pills = '';
                if (isHoliday) {
                  pills += `<div class="cal-pill holiday" title="${escapeHtml(holByDate[ds])}">⭐ ${escapeHtml(holByDate[ds])}</div>`;
                }
                // Reminders (notes) — pink/coral pill 📌
                const dayReminders = remByDate[ds] || [];
                dayReminders.slice(0, 3).forEach((r) => {
                  pills += `<div class="cal-pill reminder" title="📌 ${escapeHtml(r.panggilan)} (${escapeHtml(r.cabang)}): ${escapeHtml(r.keterangan)}">📌 ${escapeHtml(r.panggilan)}: ${escapeHtml(r.keterangan)}</div>`;
                });
                if (dayReminders.length > 3) {
                  pills += `<div class="cal-pill reminder">+${dayReminders.length - 3} reminder</div>`;
                }
                const amEntries = Object.values(byAM);
                amEntries.sort((a, b) => a.name.localeCompare(b.name));
                amEntries.slice(0, 5).forEach((am) => {
                  const cls = am.reported === am.total ? 'full' : (am.reported > 0 ? 'partial' : (am.late ? 'late' : 'none'));
                  const geoMark = am.geo > 0 ? ` 📍${am.geo}` : '';
                  pills += `<div class="cal-pill ${cls}" title="${escapeHtml(am.name)} (${escapeHtml(am.cab)}): ${am.reported}/${am.total} reported${geoMark}">${escapeHtml(am.name)} ${am.reported}/${am.total}${geoMark}</div>`;
                });
                if (amEntries.length > 5) {
                  pills += `<div class="cal-pill none">+${amEntries.length - 5} AM</div>`;
                }

                const classes = ['cal-cell'];
                if (isOutside) classes.push('outside');
                if (isToday) classes.push('today');
                else if (isHoliday) classes.push('holiday');
                else if (isWknd) classes.push('weekend');

                const drillUrl = amFilter
                  ? `/drilldown.html?user_id=${amFilter}&from=${ds}&to=${ds}`
                  : `/sales-day.html?date=${ds}`;

                cells.push(`<div class="${classes.join(' ')}" onclick="window.location='${drillUrl}'">
                  <div class="cal-date">${d.getDate()}</div>
                  ${pills}
                </div>`);
              }

              // Insert cells (preserve day headers)
              const grid = $('calGrid');
              // Remove old cells (keep first 7 headers)
              const headers = Array.from(grid.children).slice(0, 7);
              grid.innerHTML = '';
              headers.forEach((h) => grid.appendChild(h));
              grid.insertAdjacentHTML('beforeend', cells.join(''));
            }

            // Navigation
            $('navPrev').addEventListener('click', () => {
              if (view === 'month') cursor.setMonth(cursor.getMonth() - 1);
              else cursor.setDate(cursor.getDate() - 7);
              render();
            });
            $('navNext').addEventListener('click', () => {
              if (view === 'month') cursor.setMonth(cursor.getMonth() + 1);
              else cursor.setDate(cursor.getDate() + 7);
              render();
            });
            $('navToday').addEventListener('click', () => { cursor = new Date(); render(); });
            document.querySelectorAll('.cal-view-tabs button').forEach((b) => {
              b.addEventListener('click', () => {
                document.querySelectorAll('.cal-view-tabs button').forEach((x) => x.classList.remove('active'));
                b.classList.add('active');
                view = b.dataset.view;
                render();
              });
            });
            $('amFilter').addEventListener('change', () => { cache = {}; render(); });
            $('cabangFilter').addEventListener('change', () => { cache = {}; render(); });

            (async () => {
              await loadAMs();
              await loadHolidays();
              await render();
            })();
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
