<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales Calendar · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <style>
      .cal-table { width:100%; border-collapse:collapse; font-size:12px; }
      .cal-table th, .cal-table td { border:1px solid #e2e8f0; padding:6px 8px; }
      .cal-table thead th { background:#f8fafc; font-weight:600; text-align:center; white-space:nowrap; }
      .cal-table .am-cell { background:#f8fafc; font-weight:600; white-space:nowrap; min-width:140px; }
      .cal-table .day-cell { text-align:center; cursor:pointer; min-width:80px; transition:background 0.15s; }
      .cal-table .day-cell:hover { background:#fef3c7; }
      .cal-table .day-cell.full { background:#dcfce7; color:#166534; }
      .cal-table .day-cell.partial { background:#fef3c7; color:#92400e; }
      .cal-table .day-cell.late { background:#fee2e2; color:#991b1b; }
      .cal-table .day-cell.none { background:#f3f4f6; color:#9ca3af; }
      .cal-table .day-cell.weekend { background:#fafafa; color:#cbd5e1; }
      .cal-table .stats { font-size:10px; line-height:1.3; }
      .cal-table .geo-mark { font-size:11px; }
      .cal-legend { display:flex; gap:14px; font-size:12px; color:#64748b; margin-top:12px; flex-wrap:wrap; }
      .cal-legend .box { display:inline-block; width:14px; height:14px; vertical-align:middle; border-radius:3px; border:1px solid #e2e8f0; margin-right:4px; }
    </style>
  </head>
  <body data-active="sales-calendar" data-crumbs="WRG CRM &gt; Sales Calendar">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow">Sales</span>
            <h1 class="hero-title">Sales <span class="accent">Calendar</span></h1>
            <p class="hero-sub">Kalender plan & report Account Manager. Klik cell untuk drilldown per AM-tanggal.</p>
          </div>
          <div class="hero-actions">
            <input type="date" id="dateFrom" class="btn btn--ghost" style="padding:6px 10px;">
            <input type="date" id="dateTo" class="btn btn--ghost" style="padding:6px 10px;">
            <button class="btn btn--ghost" data-preset="week">Minggu ini</button>
            <button class="btn btn--ghost" data-preset="lastweek">Minggu lalu</button>
            <button class="btn btn--ghost" data-preset="month">Bulan ini</button>
            <select id="cabangFilter" class="btn btn--ghost" style="padding:6px 10px;">
              <option value="">Semua cabang</option>
            </select>
            <button class="btn btn--primary" id="btnApply">Apply</button>
          </div>
        </section>

        <div class="grid">
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">AM coverage</span>
                <h2 class="card-title">Plan & Report Calendar</h2>
              </div>
              <span class="card-action" id="calRange">—</span>
            </div>
            <div style="overflow-x:auto; max-width:100%;">
              <table class="cal-table" id="calTable">
                <thead><tr id="calHead"></tr></thead>
                <tbody id="calBody">
                  <tr><td style="padding:24px; text-align:center; color:#94a3b8;" id="calLoading">Memuat…</td></tr>
                </tbody>
              </table>
            </div>
            <div class="cal-legend">
              <span><span class="box" style="background:#dcfce7;"></span>All reported</span>
              <span><span class="box" style="background:#fef3c7;"></span>Partial reported</span>
              <span><span class="box" style="background:#fee2e2;"></span>Late / no report</span>
              <span><span class="box" style="background:#f3f4f6;"></span>No plan</span>
              <span><span class="box" style="background:#fafafa;"></span>Weekend / libur</span>
              <span>📍 = ada visit geotag</span>
            </div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);

            function fmtDate(d) {
              if (typeof d === 'string') d = new Date(d);
              return d.toISOString().slice(0, 10);
            }
            function fmtDayShort(d) {
              const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
              return `${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
            }
            function eachDay(from, to) {
              const out = [];
              const d = new Date(from);
              const end = new Date(to);
              while (d <= end) { out.push(new Date(d)); d.setDate(d.getDate() + 1); }
              return out;
            }

            // Date presets
            function setRange(from, to) {
              $('dateFrom').value = fmtDate(from);
              $('dateTo').value = fmtDate(to);
            }
            function thisWeek() {
              const t = new Date();
              const day = t.getDay() || 7; // 1=Mon..7=Sun
              const mon = new Date(t); mon.setDate(t.getDate() - (day - 1));
              const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
              return [mon, sun];
            }
            function lastWeek() {
              const [mon] = thisWeek();
              const lmon = new Date(mon); lmon.setDate(mon.getDate() - 7);
              const lsun = new Date(lmon); lsun.setDate(lmon.getDate() + 6);
              return [lmon, lsun];
            }
            function thisMonth() {
              const t = new Date();
              const first = new Date(t.getFullYear(), t.getMonth(), 1);
              const last = new Date(t.getFullYear(), t.getMonth() + 1, 0);
              return [first, last];
            }
            document.querySelectorAll('[data-preset]').forEach((btn) => {
              btn.addEventListener('click', () => {
                const p = btn.dataset.preset;
                const range = p === 'week' ? thisWeek() : p === 'lastweek' ? lastWeek() : thisMonth();
                setRange(range[0], range[1]);
                load();
              });
            });
            $('btnApply').addEventListener('click', load);

            // Initial: this week
            const [iFrom, iTo] = thisWeek();
            setRange(iFrom, iTo);

            // Load cabang options
            async function loadCabang() {
              try {
                const r = await fetch('/api/users');
                if (!r.ok) return;
                const json = await r.json();
                const cabs = [...new Set((json.rows || []).filter((u) => u.role === 'AM' && u.aktif).map((u) => u.cabang))].sort();
                cabs.forEach((c) => {
                  const opt = document.createElement('option');
                  opt.value = c; opt.textContent = c;
                  $('cabangFilter').appendChild(opt);
                });
              } catch (e) { console.error(e); }
            }

            async function load() {
              const from = $('dateFrom').value;
              const to = $('dateTo').value;
              if (!from || !to) return;
              $('calRange').textContent = `${from} → ${to}`;
              $('calLoading').textContent = 'Memuat data AM…';

              const cabangFilter = $('cabangFilter').value;

              try {
                // Get all AM users
                const ur = await fetch('/api/users');
                const ujson = await ur.json();
                let ams = (ujson.rows || []).filter((u) => u.role === 'AM' && u.aktif);
                if (cabangFilter) ams = ams.filter((a) => a.cabang === cabangFilter);
                ams.sort((a, b) => (a.cabang || '').localeCompare(b.cabang || '') || (a.panggilan || '').localeCompare(b.panggilan || ''));

                if (ams.length === 0) {
                  $('calBody').innerHTML = '<tr><td style="padding:24px; text-align:center; color:#94a3b8;">Tidak ada AM aktif untuk filter ini.</td></tr>';
                  $('calHead').innerHTML = '';
                  return;
                }

                // Fetch drilldown per AM (parallel)
                const days = eachDay(from, to);
                const drilldowns = await Promise.all(ams.map(async (am) => {
                  try {
                    const r = await fetch(`/api/drilldown?user_id=${am.id}&from=${from}&to=${to}`);
                    if (!r.ok) return { user: am, plans: [] };
                    const json = await r.json();
                    return { user: am, plans: json.plans || [] };
                  } catch (e) { return { user: am, plans: [] }; }
                }));

                // Build header
                const headHtml = `<th class="am-cell">AM (Cabang)</th>` + days.map((d) => {
                  const wknd = d.getDay() === 0 || d.getDay() === 6;
                  return `<th style="${wknd ? 'background:#fafafa; color:#9ca3af;' : ''}">${fmtDayShort(d)}</th>`;
                }).join('');
                $('calHead').innerHTML = headHtml;

                // Build rows
                const rowsHtml = drilldowns.map(({ user, plans }) => {
                  const cells = days.map((d) => {
                    const wknd = d.getDay() === 0 || d.getDay() === 6;
                    const dStr = fmtDate(d);
                    const dayPlans = plans.filter((p) => (p.tanggal || '').startsWith(dStr));
                    const total = dayPlans.length;
                    const reported = dayPlans.filter((p) => p.reported).length;
                    const withGeo = dayPlans.filter((p) => p.visit_lat).length;
                    const anyLate = dayPlans.some((p) => p.is_late_plan && !p.reported);

                    let cls;
                    if (total === 0) cls = wknd ? 'weekend' : 'none';
                    else if (reported === total) cls = 'full';
                    else if (reported > 0) cls = 'partial';
                    else cls = anyLate ? 'late' : 'partial';

                    const url = `/drilldown.html?user_id=${user.id}&from=${dStr}&to=${dStr}`;
                    const stats = total === 0
                      ? '<span class="stats">—</span>'
                      : `<div class="stats"><strong>${reported}/${total}</strong> rep${withGeo > 0 ? ` <span class="geo-mark">📍${withGeo}</span>` : ''}</div>`;

                    return `<td class="day-cell ${cls}" onclick="window.location='${url}'">${stats}</td>`;
                  }).join('');
                  return `<tr><td class="am-cell"><a href="/drilldown.html?user_id=${user.id}&from=${from}&to=${to}" style="color:inherit; text-decoration:none;">${escapeHtml(user.panggilan)} <small style="color:#94a3b8; font-weight:400;">(${escapeHtml(user.cabang || '-')})</small></a></td>${cells}</tr>`;
                }).join('');

                $('calBody').innerHTML = rowsHtml;
              } catch (e) {
                console.error(e);
                $('calBody').innerHTML = `<tr><td style="padding:24px; text-align:center; color:#dc2626;">Error: ${e.message}</td></tr>`;
              }
            }

            function escapeHtml(s) {
              return (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            }

            (async () => {
              await loadCabang();
              await load();
            })();
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
