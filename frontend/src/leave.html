<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Leave · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="leave" data-crumbs="WRG CRM | Manage Leave">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <span class="eyebrow">Admin</span>
            <h1 class="hero-title">Manage <span class="accent">Leave</span></h1>
            <p class="hero-sub">Catat ijin/sakit/cuti per karyawan. Entry di sini langsung exclude user dari reminders &amp; daily summary denominator pada tanggal-tanggal terkait.</p>
          </div>
        </section>

        <!-- ============ ADD FORM ============ -->
        <div class="grid">
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">New entry</span>
                <h2 class="card-title">Tambah ijin</h2>
              </div>
            </div>
            <style>
              #leaveForm .field { display:flex; flex-direction:column; }
              #leaveForm .field-label { min-height: 20px; line-height: 1.4; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
              #leaveForm .input, #leaveForm .select, #leaveForm .btn { height: 40px; box-sizing: border-box; }
              #leaveForm .req-spacer { opacity: 0; }
            </style>
            <form id="leaveForm" class="form-grid" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:14px; align-items:stretch;">
              <div class="field">
                <label class="field-label" for="fUser">Karyawan <span class="req">*</span></label>
                <select id="fUser" class="select" required></select>
              </div>
              <div class="field">
                <label class="field-label" for="fStart">Mulai <span class="req">*</span></label>
                <input type="date" id="fStart" class="input" required>
              </div>
              <div class="field">
                <label class="field-label" for="fEnd">Sampai <span class="req req-spacer">*</span></label>
                <input type="date" id="fEnd" class="input">
              </div>
              <div class="field">
                <label class="field-label" for="fJenis">Jenis <span class="req">*</span></label>
                <select id="fJenis" class="select" required>
                  <option value="sakit">sakit</option>
                  <option value="cuti">cuti</option>
                  <option value="ijin">ijin</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label"><span class="req-spacer">&nbsp;</span></label>
                <button type="submit" class="btn btn--primary">+ Add</button>
              </div>
              <div class="field" style="grid-column:1 / -1;">
                <label class="field-label" for="fKet">Keterangan</label>
                <input type="text" id="fKet" class="input" placeholder="opsional (mis. 'flu', 'cuti tahunan')">
              </div>
            </form>
          </section>

          <!-- ============ EXISTING LEAVES TABLE ============ -->
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">All entries</span>
                <h2 class="card-title">Daftar ijin</h2>
              </div>
              <span class="card-action" id="leaveCount">…</span>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:end; padding:0 0 12px;">
              <div>
                <label style="display:block; font-size:11px; color:#64748b; margin-bottom:4px;">Dari</label>
                <input id="fltFrom" type="date" class="input" style="height:36px; min-width:150px;">
              </div>
              <div>
                <label style="display:block; font-size:11px; color:#64748b; margin-bottom:4px;">Sampai</label>
                <input id="fltTo" type="date" class="input" style="height:36px; min-width:150px;">
              </div>
              <div style="display:flex; gap:6px;">
                <button type="button" class="btn btn--ghost" id="fltPresetActive" style="font-size:12px;">Active</button>
                <button type="button" class="btn btn--ghost" id="fltPresetMonth" style="font-size:12px;">Bulan ini</button>
                <button type="button" class="btn btn--ghost" id="fltPresetAll" style="font-size:12px;">Semua</button>
              </div>
            </div>
            <div style="overflow-x:auto;">
              <table style="width:100%; font-size:13px;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Karyawan</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Role</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Mulai</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Sampai</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Jenis</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Keterangan</th>
                    <th style="padding:8px; text-align:left; border-bottom:2px solid #e2e8f0;">Created</th>
                    <th style="padding:8px; text-align:right; border-bottom:2px solid #e2e8f0;">Action</th>
                  </tr>
                </thead>
                <tbody id="leaveBody"><tr><td colspan="8" style="padding:24px; text-align:center; color:#94a3b8;">Memuat…</td></tr></tbody>
              </table>
            </div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);
            const escapeHtml = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

            async function loadUsers() {
              const r = await fetch('/api/users');
              const json = await r.json();
              const opts = (json.rows || []).filter((u) => u.aktif).map((u) =>
                `<option value="${u.id}">${escapeHtml(u.panggilan || u.nama)} (${escapeHtml(u.role)})</option>`
              ).join('');
              $('fUser').innerHTML = '<option value="">— pilih —</option>' + opts;
            }

            let allLeaves = [];

            async function loadLeaves() {
              const r = await fetch('/api/leave');
              const json = await r.json();
              allLeaves = json.rows || [];
              applyFilter();
            }

            function applyFilter() {
              const from = $('fltFrom').value;
              const to   = $('fltTo').value;
              // Overlap semantics: row.start <= to AND row.end >= from
              const rows = allLeaves.filter((row) => {
                if (from && row.end_date   < from) return false;
                if (to   && row.start_date > to)   return false;
                return true;
              });
              $('leaveCount').textContent = (from || to)
                ? `${rows.length} of ${allLeaves.length} entries`
                : `${allLeaves.length} entries`;
              renderRows(rows);
            }

            function renderRows(rows) {
              if (rows.length === 0) {
                $('leaveBody').innerHTML = '<tr><td colspan="8" style="padding:24px; text-align:center; color:#94a3b8;">Tidak ada entry dalam range ini.</td></tr>';
                return;
              }
              $('leaveBody').innerHTML = rows.map((row) => `
                <tr>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;"><strong>${escapeHtml(row.panggilan || row.nama)}</strong></td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(row.role)}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(row.start_date)}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;">${escapeHtml(row.end_date)}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9;"><span style="background:#ddd6fe; color:#5b21b6; padding:2px 8px; border-radius:6px; font-size:11px;">${escapeHtml(row.jenis)}</span></td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; font-size:12px; color:#64748b;">${escapeHtml(row.keterangan || '')}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; font-size:11px; color:#94a3b8;">${escapeHtml((row.created_at || '').slice(0, 16))}</td>
                  <td style="padding:8px; border-bottom:1px solid #f1f5f9; text-align:right; white-space:nowrap;">
                    <button class="btn btn--ghost" onclick='editLeave(${JSON.stringify(row)})' style="font-size:11px; color:#0e7490; margin-right:4px;">Edit</button>
                    <button class="btn btn--ghost" onclick="deleteLeave(${row.id})" style="font-size:11px; color:#dc2626;">Delete</button>
                  </td>
                </tr>
              `).join('');
            }

            window.deleteLeave = async (id) => {
              if (!confirm('Hapus entry ini?')) return;
              const r = await fetch(`/api/leave/${id}`, { method: 'DELETE' });
              if (r.ok) { loadLeaves(); }
              else { alert('Gagal hapus: ' + r.status); }
            };

            window.editLeave = (row) => {
              // Inline modal — adjust extent cuti/ijin/sakit
              const html = `
                <div id="editModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center;">
                  <div style="background:#fff; border-radius:8px; padding:24px; width:480px; max-width:90vw;">
                    <h3 style="margin:0 0 16px;">Edit Ijin — ${escapeHtml(row.panggilan || row.nama)}</h3>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                      <div>
                        <label style="display:block; font-size:12px; color:#64748b; margin-bottom:4px;">Mulai</label>
                        <input id="editStart" type="date" class="input" value="${row.start_date}" style="width:100%; height:40px;">
                      </div>
                      <div>
                        <label style="display:block; font-size:12px; color:#64748b; margin-bottom:4px;">Sampai (extend di sini)</label>
                        <input id="editEnd" type="date" class="input" value="${row.end_date}" style="width:100%; height:40px;">
                      </div>
                      <div>
                        <label style="display:block; font-size:12px; color:#64748b; margin-bottom:4px;">Jenis</label>
                        <select id="editJenis" class="select" style="width:100%; height:40px;">
                          <option value="sakit"${row.jenis==='sakit'?' selected':''}>sakit</option>
                          <option value="cuti"${row.jenis==='cuti'?' selected':''}>cuti</option>
                          <option value="ijin"${row.jenis==='ijin'?' selected':''}>ijin</option>
                        </select>
                      </div>
                      <div>
                        <label style="display:block; font-size:12px; color:#64748b; margin-bottom:4px;">Keterangan</label>
                        <input id="editKet" type="text" class="input" value="${escapeHtml(row.keterangan || '')}" style="width:100%; height:40px;">
                      </div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px;">
                      <button class="btn btn--ghost" onclick="document.getElementById('editModal').remove()">Cancel</button>
                      <button class="btn btn--primary" id="editSave">Simpan</button>
                    </div>
                  </div>
                </div>`;
              document.body.insertAdjacentHTML('beforeend', html);
              document.getElementById('editSave').addEventListener('click', async () => {
                const body = {
                  start_date: document.getElementById('editStart').value,
                  end_date: document.getElementById('editEnd').value,
                  jenis: document.getElementById('editJenis').value,
                  keterangan: document.getElementById('editKet').value,
                };
                const r = await fetch(`/api/leave/${row.id}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(body),
                });
                if (r.ok) {
                  document.getElementById('editModal').remove();
                  loadLeaves();
                } else {
                  const err = await r.json().catch(() => ({}));
                  alert('Gagal: ' + (err.error || r.status));
                }
              });
            };

            $('leaveForm').addEventListener('submit', async (e) => {
              e.preventDefault();
              const body = {
                user_id: parseInt($('fUser').value, 10),
                start_date: $('fStart').value,
                end_date: $('fEnd').value || $('fStart').value,
                jenis: $('fJenis').value,
                keterangan: $('fKet').value,
              };
              if (!body.user_id || !body.start_date) { alert('User & tanggal mulai wajib'); return; }
              const r = await fetch('/api/leave', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
              if (r.ok) {
                $('leaveForm').reset();
                loadLeaves();
              } else {
                const err = await r.json().catch(() => ({}));
                alert('Gagal: ' + (err.error || r.status));
              }
            });

            function setPresetActive() {
              const today = new Date().toISOString().slice(0, 10);
              $('fltFrom').value = today;
              $('fltTo').value = today;
              applyFilter();
            }
            function setPresetMonth() {
              const d = new Date();
              const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0');
              const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
              $('fltFrom').value = `${y}-${m}-01`;
              $('fltTo').value   = `${y}-${m}-${String(last).padStart(2, '0')}`;
              applyFilter();
            }
            function setPresetAll() {
              $('fltFrom').value = '';
              $('fltTo').value   = '';
              applyFilter();
            }

            document.addEventListener('DOMContentLoaded', () => {
              const today = new Date().toISOString().slice(0, 10);
              $('fStart').value = today;
              $('fEnd').value = today;
              // Default filter: Active (covering today's leaves)
              setPresetActive();
              $('fltFrom').addEventListener('change', applyFilter);
              $('fltTo').addEventListener('change', applyFilter);
              $('fltPresetActive').addEventListener('click', setPresetActive);
              $('fltPresetMonth').addEventListener('click', setPresetMonth);
              $('fltPresetAll').addEventListener('click', setPresetAll);
              loadUsers();
              loadLeaves();
            });
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
