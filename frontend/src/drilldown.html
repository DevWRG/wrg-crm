<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail Plan &amp; Report · WRG CRM</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dash26-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body data-active="dashboard" data-crumbs="WRG CRM &gt; Plan &amp; Report &gt; Detail">
    <div class="shell">
      <div data-shell-sidebar></div>
      <div class="main">
        <div data-shell-topbar></div>
        <main class="content">

        <section class="hero">
          <div class="hero-text">
            <a class="btn btn--ghost" href="/index.html" style="margin-bottom:10px; display:inline-block;">← Back</a>
            <span class="eyebrow" id="drillRoleTag">—</span>
            <h1 class="hero-title" id="drillTitle">Memuat…</h1>
            <p class="hero-sub" id="drillSub">—</p>
          </div>
          <div class="hero-actions">
            <input type="date" id="dateFrom" class="btn btn--ghost" style="padding:6px 10px;">
            <input type="date" id="dateTo" class="btn btn--ghost" style="padding:6px 10px;">
            <button class="btn btn--ghost" data-preset="week">Minggu ini</button>
            <button class="btn btn--ghost" data-preset="month">Bulan ini</button>
            <button class="btn btn--primary" id="btnApply">Apply</button>
          </div>
        </section>

        <div class="grid">
          <section class="col-12 card">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">User info</span>
                <h2 class="card-title" id="userName">—</h2>
              </div>
            </div>
            <div id="userInfo" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px 20px; padding:8px 4px; font-size:13px;"></div>
          </section>

          <section class="col-12 card" id="planSection" style="display:none;">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">AM mode</span>
                <h2 class="card-title">Plan Kunjungan <span id="planCount" style="color:#94a3b8; font-weight:400; font-size:14px;"></span></h2>
              </div>
            </div>
            <div id="planTable"></div>
          </section>

          <section class="col-12 card" id="todoSection" style="display:none;">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">TODO mode</span>
                <h2 class="card-title">Todo List <span id="todoCount" style="color:#94a3b8; font-weight:400; font-size:14px;"></span></h2>
              </div>
            </div>
            <div id="todoTable"></div>
          </section>

          <section class="col-12 card" id="actSection" style="display:none;">
            <div class="card-head">
              <div class="card-title-wrap">
                <span class="eyebrow">Unmatched</span>
                <h2 class="card-title" style="color:#dc2626;">Aktivitas di luar plan <span id="actCount" style="color:#94a3b8; font-weight:400; font-size:14px;"></span></h2>
              </div>
            </div>
            <div id="actTable"></div>
          </section>
        </div>

        <script>
          (function () {
            'use strict';
            const $ = (id) => document.getElementById(id);
            const escapeHtml = (s) => (s == null ? '' : String(s)).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' }) : '—';
            const fmtTime = (iso) => iso ? new Date(iso).toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '—';
            const badge = (text, color) => `<span style="background:${color}1a; color:${color}; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600;">${escapeHtml(text)}</span>`;

            function defaultRange() {
              const today = new Date();
              const dow = today.getDay() || 7;
              const mon = new Date(today); mon.setDate(today.getDate() - (dow - 1));
              const sun = new Date(mon);   sun.setDate(mon.getDate() + 6);
              const end = sun < today ? sun : today;
              const iso = (d) => d.toISOString().slice(0, 10);
              return [iso(mon), iso(end)];
            }
            function monthRange() {
              const today = new Date();
              const first = new Date(today.getFullYear(), today.getMonth(), 1);
              const iso = (d) => d.toISOString().slice(0, 10);
              return [iso(first), iso(today)];
            }

            const params = new URLSearchParams(location.search);
            const userId = parseInt(params.get('user_id'), 10);
            if (!userId) { $('drillTitle').textContent = 'user_id tidak ada di URL'; return; }

            const state = { from: params.get('from'), to: params.get('to') };
            if (!state.from || !state.to) [state.from, state.to] = defaultRange();

            async function load() {
              $('dateFrom').value = state.from;
              $('dateTo').value = state.to;
              const r = await fetch(`/api/drilldown?user_id=${userId}&from=${state.from}&to=${state.to}`);
              if (!r.ok) { $('drillTitle').textContent = 'Error: ' + r.status; return; }
              const json = await r.json();
              const d = json.detail || {};
              const u = d.user || {};

              $('drillRoleTag').textContent = (u.role || '—') + (u.posisi ? ' · ' + u.posisi : '');
              $('drillTitle').textContent = u.panggilan || '—';
              $('drillSub').textContent = `${u.nama || ''} · ${u.cabang || ''} · range ${state.from} → ${state.to}`;
              $('userName').textContent = `${u.panggilan || ''} — ${u.nama || ''}`;
              $('userInfo').innerHTML = `
                <div><div style="color:#94a3b8; font-size:10px; text-transform:uppercase;">Role</div><strong>${escapeHtml(u.role || '—')}</strong></div>
                <div><div style="color:#94a3b8; font-size:10px; text-transform:uppercase;">Posisi</div><strong>${escapeHtml(u.posisi || '—')}</strong></div>
                <div><div style="color:#94a3b8; font-size:10px; text-transform:uppercase;">Cabang</div><strong>${escapeHtml(u.cabang || '—')}</strong></div>
                <div><div style="color:#94a3b8; font-size:10px; text-transform:uppercase;">WA</div><strong style="font-family:monospace;">${escapeHtml(u.wa_number || '—')}</strong></div>`;

              const isAM = u.role === 'AM';
              const planRows = d.plan || [];
              const todoRows = d.todo || [];
              const actRows = d.unmatched_activity || [];

              // PLAN section (AM)
              if (isAM || planRows.length > 0) {
                $('planSection').style.display = '';
                $('planCount').textContent = `(${planRows.length})`;
                $('planTable').innerHTML = planRows.length === 0
                  ? '<div style="color:#94a3b8; font-style:italic; padding:8px;">Tidak ada plan kunjungan pada periode ini.</div>'
                  : `<div style="overflow-x:auto;"><table style="width:100%; font-size:12px; border-collapse:collapse;">
                      <thead><tr style="background:#f8fafc;">
                        <th style="padding:8px 10px; text-align:left;">Tgl</th>
                        <th style="padding:8px 10px; text-align:left;">Customer</th>
                        <th style="padding:8px 10px; text-align:left;">Tujuan</th>
                        <th style="padding:8px 10px; text-align:left;">Goal</th>
                        <th style="padding:8px 10px; text-align:center;">Status</th>
                        <th style="padding:8px 10px; text-align:left;">Hasil</th>
                        <th style="padding:8px 10px; text-align:left;">Next</th>
                        <th style="padding:8px 10px; text-align:left;">Visit Geotag</th>
                      </tr></thead><tbody>
                      ${planRows.map((p) => {
                        const visitCell = p.visit_lat && p.visit_lon
                          ? `<a href="https://www.google.com/maps?q=${p.visit_lat},${p.visit_lon}" target="_blank">📍 ${p.visit_lat}, ${p.visit_lon}</a>`
                            + (p.visit_timestamp ? `<div style="font-size:10px; color:#94a3b8;">${escapeHtml(String(p.visit_timestamp).replace('T',' ').slice(0,16))}</div>` : '')
                            + (p.visit_date_mismatch ? `<div style="margin-top:2px;">${badge('⚠️ tanggal mismatch', '#dc2626')}</div>` : '')
                          : (p.reported ? '<span style="color:#dc2626; font-size:11px;">⚠️ no geotag</span>' : '<span style="color:#94a3b8;">—</span>');
                        return `
                        <tr style="border-top:1px solid #f1f5f9;">
                          <td style="padding:8px 10px; white-space:nowrap;">${fmtDate(p.tanggal)}</td>
                          <td style="padding:8px 10px;"><strong>${escapeHtml(p.customer_name)}</strong></td>
                          <td style="padding:8px 10px;">${escapeHtml(p.tujuan || '—')}</td>
                          <td style="padding:8px 10px; color:#64748b;">${escapeHtml(p.goal || '—')}</td>
                          <td style="padding:8px 10px; text-align:center;">${p.reported ? badge('reported', '#16a34a') : (p.is_late_plan ? badge('late', '#dc2626') : badge('pending', '#94a3b8'))}</td>
                          <td style="padding:8px 10px; font-size:11px; color:#475569;">${escapeHtml(p.hasil || '—')}</td>
                          <td style="padding:8px 10px; font-size:11px; color:#475569;">${escapeHtml(p.next_action || '—')}</td>
                          <td style="padding:8px 10px; font-size:11px;">${visitCell}</td>
                        </tr>`;
                      }).join('')}
                    </tbody></table></div>`;
              }

              // TODO section
              if (!isAM || todoRows.length > 0) {
                $('todoSection').style.display = '';
                $('todoCount').textContent = `(${todoRows.length} hari)`;
                $('todoTable').innerHTML = todoRows.length === 0
                  ? '<div style="color:#94a3b8; font-style:italic; padding:8px;">Tidak ada todo list pada periode ini.</div>'
                  : todoRows.map((t) => {
                    const items = Array.isArray(t.items) ? t.items : [];
                    const reportItems = Array.isArray(t.report_data) ? t.report_data : [];
                    const statusBadge = t.reported
                      ? badge(`✓ reported ${reportItems.length}/${items.length}`, '#16a34a')
                      : (t.is_late_plan ? badge('late, belum report', '#dc2626') : badge('pending', '#94a3b8'));
                    const reportByIdx = {};
                    reportItems.forEach((rr) => { reportByIdx[rr.idx - 1] = rr; });
                    return `
                      <div style="border:1px solid #e2e8f0; border-radius:8px; margin-bottom:14px;">
                        <div style="background:#f8fafc; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e2e8f0;">
                          <div><strong>${fmtDate(t.tanggal)}</strong> <span style="color:#94a3b8; font-size:11px; margin-left:8px;">${items.length} item · submit ${fmtTime(t.submitted_at)}</span></div>
                          ${statusBadge}
                        </div>
                        <div style="overflow-x:auto;">
                          <table style="width:100%; font-size:12px; border-collapse:collapse;">
                            <thead><tr style="background:#fafbfc;">
                              <th style="padding:8px 10px; text-align:left; width:32px;">#</th>
                              <th style="padding:8px 10px; text-align:left;">Plan task</th>
                              <th style="padding:8px 10px; text-align:left;">Report result</th>
                              <th style="padding:8px 10px; text-align:center; width:110px;">Status</th>
                            </tr></thead>
                            <tbody>
                            ${items.map((it, i) => {
                              const rep = reportByIdx[i];
                              const matched = rep && rep.status === 'matched';
                              const ambig = rep && rep.status === 'ambiguous';
                              const statusCol = !rep ? badge('—', '#94a3b8')
                                : matched ? badge('matched', '#16a34a')
                                : ambig   ? badge('ambiguous', '#d97706')
                                          : badge('baru', '#dc2626');
                              const repCell = rep ? escapeHtml(rep.result || rep.task || '') : '<span style="color:#94a3b8;">—</span>';
                              return `<tr style="border-top:1px solid #f1f5f9;">
                                <td style="padding:6px 10px; color:#94a3b8;">${i + 1}</td>
                                <td style="padding:6px 10px;">${escapeHtml(it)}</td>
                                <td style="padding:6px 10px; color:#475569;">${repCell}</td>
                                <td style="padding:6px 10px; text-align:center;">${statusCol}</td>
                              </tr>`;
                            }).join('')}
                            </tbody>
                          </table>
                        </div>
                      </div>`;
                  }).join('');
              }

              // Unmatched activity
              if (actRows.length > 0) {
                $('actSection').style.display = '';
                $('actCount').textContent = `(${actRows.length})`;
                $('actTable').innerHTML = `<div style="overflow-x:auto;"><table style="width:100%; font-size:12px; border-collapse:collapse;">
                    <thead><tr style="background:#fef2f2;">
                      <th style="padding:8px 10px; text-align:left;">Tgl</th>
                      <th style="padding:8px 10px; text-align:left;">Customer</th>
                      <th style="padding:8px 10px; text-align:left;">Hasil</th>
                      <th style="padding:8px 10px; text-align:left;">Next</th>
                    </tr></thead><tbody>
                    ${actRows.map((a) => `
                      <tr style="border-top:1px solid #fee2e2;">
                        <td style="padding:8px 10px;">${fmtDate(a.tanggal)}</td>
                        <td style="padding:8px 10px;"><strong>${escapeHtml(a.customer_name)}</strong></td>
                        <td style="padding:8px 10px;">${escapeHtml(a.hasil || '—')}</td>
                        <td style="padding:8px 10px; color:#64748b;">${escapeHtml(a.next_action || '—')}</td>
                      </tr>`).join('')}
                  </tbody></table></div>`;
              }
            }

            document.addEventListener('DOMContentLoaded', () => {
              $('btnApply').addEventListener('click', () => {
                state.from = $('dateFrom').value;
                state.to = $('dateTo').value;
                history.replaceState(null, '', `?user_id=${userId}&from=${state.from}&to=${state.to}`);
                // Reset sections then reload
                ['planSection','todoSection','actSection'].forEach(id => $(id).style.display = 'none');
                load();
              });
              document.querySelectorAll('[data-preset]').forEach((btn) => {
                btn.addEventListener('click', () => {
                  const preset = btn.dataset.preset;
                  if (preset === 'week') [state.from, state.to] = defaultRange();
                  if (preset === 'month') [state.from, state.to] = monthRange();
                  $('btnApply').click();
                });
              });
              load();
            });
          })();
        </script>

        </main>
        <div data-shell-footer></div>
      </div>
    </div>
  </body>
</html>
